<!DOCTYPE html>
<html>
<head>
    <title>Loan Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">
    <h1 class="text-2xl font-bold mb-4 text-center">Loan Prediction</h1>

    <form method="POST" class="grid grid-cols-2 gap-4">

        <!-- Age -->
        <select name="person_age" class="p-2 border rounded">
            <option>18</option><option>25</option><option>30</option>
            <option>35</option><option>40</option><option>50</option>
        </select>

        <!-- Gender -->
        <select name="person_gender" class="p-2 border rounded">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <!-- Education -->
        <select name="person_education" class="p-2 border rounded">
            <option>High School</option>
            <option>Associate</option>
            <option>Bachelor</option>
            <option>Master</option>
            <option>Doctorate</option>
        </select>

        <!-- Income -->
        <select name="person_income" class="p-2 border rounded">
            <option>20000</option><option>40000</option>
            <option>60000</option><option>80000</option>
            <option>100000</option>
        </select>

        <!-- Experience -->
        <select name="person_emp_exp" class="p-2 border rounded">
            <option>0</option><option>1</option><option>3</option>
            <option>5</option><option>10</option>
        </select>

        <!-- Loan Amount -->
        <select name="loan_amnt" class="p-2 border rounded">
            <option>5000</option><option>10000</option>
            <option>15000</option><option>20000</option>
        </select>

        <!-- Interest Rate -->
        <select name="loan_int_rate" class="p-2 border rounded">
            <option>5</option><option>8</option>
            <option>10</option><option>12</option>
            <option>15</option>
        </select>

        <!-- Loan % Income -->
        <select name="loan_percent_income" class="p-2 border rounded">
            <option>0.1</option><option>0.2</option>
            <option>0.3</option><option>0.4</option>
        </select>

        <!-- Credit History -->
        <select name="cb_person_cred_hist_length" class="p-2 border rounded">
            <option>2</option><option>5</option>
            <option>10</option><option>15</option>
        </select>

        <!-- Credit Score -->
        <select name="credit_score" class="p-2 border rounded">
            <option>600</option><option>650</option>
            <option>700</option><option>750</option>
            <option>800</option>
        </select>

        <!-- Defaults -->
        <select name="previous_loan_defaults_on_file" class="p-2 border rounded">
            <option>No</option>
            <option>Yes</option>
        </select>

        <!-- Home Ownership -->
        <select name="person_home_ownership" class="p-2 border rounded">
            <option>RENT</option>
            <option>OWN</option>
            <option>MORTGAGE</option>
            <option>OTHER</option>
        </select>

        <!-- Loan Intent -->
        <select name="loan_intent" class="p-2 border rounded">
            <option>PERSONAL</option>
            <option>EDUCATION</option>
            <option>MEDICAL</option>
            <option>VENTURE</option>
            <option>HOMEIMPROVEMENT</option>
            <option>DEBTCONSOLIDATION</option>
        </select>

        <button class="col-span-2 bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
            Predict
        </button>
    </form>

    {% if prediction is not none %}
    <div class="mt-6 text-center">
        <h2 class="text-xl font-semibold">Result:</h2>
        <p class="text-lg mt-2">
            Prediction: 
            <span class="font-bold text-green-600">{{ prediction }}</span>
        </p>
        <p class="text-lg">
            Approval Probability: 
            <span class="font-bold text-blue-600">{{ prob }}%</span>
        </p>
    </div>
    {% endif %}
</div>

</body>
</html>
